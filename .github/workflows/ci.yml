# CI Workflow – Haushaltsmanager
#
# Runs on every push and pull request to any branch.
# Steps:
#   1. TypeScript type check  (pnpm check)
#   2. i18n lint              (pnpm lint:i18n)
#      - Detects duplicate JSON keys
#      - Verifies DE ↔ EN key parity
#      - Catches t() calls whose key is missing from the locale files
#   3. Unit tests             (vitest – only tests that do not require a DB)
#
# Note: Integration tests that require a live MySQL connection are excluded
# from CI because no database service is configured here. They are run
# separately in the staging environment against the real database.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Type-check · i18n lint · Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm check

      - name: i18n lint (duplicate keys + missing translations)
        run: pnpm lint:i18n

      - name: Unit tests (no database required)
        run: |
          npx vitest run \
            server/lint-i18n.test.ts \
            server/auth.logout.test.ts \
            server/i18n-config.test.ts \
            server/getMemberNames-robustness.test.ts \
            server/rotation-schedule-autofill.test.ts \
            server/task-clear-repeat.test.ts \
            server/updateTask-flatten.test.ts \
            server/activity.duedate.test.ts
        env:
          # Vitest needs JWT_SECRET even for unit tests (imported via env.ts)
          JWT_SECRET: "ci-secret-for-unit-tests-only"
